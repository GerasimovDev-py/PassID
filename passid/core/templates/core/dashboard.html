{% extends 'core/base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Личный кабинет охранника</h2>
        <a href="{% url 'staff_logout' %}" class="btn btn-outline-danger">Выйти</a>
    </div>

    <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
        <li class="nav-item">
            <a class="nav-link active" id="active-tab" data-bs-toggle="tab" href="#active" role="tab">Активные заявки</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="archive-tab" data-bs-toggle="tab" href="#archive" role="tab">Архив</a>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="active" role="tabpanel">
            <div id="active-list">
                {% include 'core/dashboard_partial_active.html' %}
            </div>
        </div>
        
        <div class="tab-pane fade" id="archive" role="tabpanel">
            <div id="archive-list">
                {% include 'core/dashboard_partial_archive.html' %}
            </div>
        </div>
    </div>
</div>

<script>
function updateActive() {
    fetch("{% url 'dashboard_partial' %}?tab=active")
        .then(response => response.text())
        .then(html => {
            document.getElementById('active-list').innerHTML = html;
        })
        .catch(error => console.error('Error:', error));
}

function updateArchive() {
    fetch("{% url 'dashboard_partial' %}?tab=archive")
        .then(response => response.text())
        .then(html => {
            document.getElementById('archive-list').innerHTML = html;
        })
        .catch(error => console.error('Error:', error));
}

function markDeparted(pk) {
    if (!confirm('Отметить посетителя как ушедшего?')) return;
    
    fetch(`/departed/${pk}/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': '{{ csrf_token }}'
        }
    }).then(response => {
        if (response.ok) {
            updateActive();
            updateArchive();
        }
    });
}

setInterval(updateActive, 5000);

window.addEventListener('load', () => {
    updateActive();
    updateArchive();
});
</script>

{% endblock %}
