{% extends 'core/base.html' %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0" style="border-radius: 20px;">
            <div class="card-body p-5">
                <h3 class="fw-bold mb-4 text-center">Вход в кабинет сотрудника службы безопасности</h3>
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger text-center">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя</label>
                        <input type="text" name="username" class="form-control" placeholder="ohrannik" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="12345" required>
                    </div>
                    <button type="submit" class="btn-passid w-100 py-3">ВОЙТИ В СИСТЕМУ</button>
                </form>

                <div class="text-center mt-4 small text-muted">
                    Тестовый аккаунт:<br>
                    <strong>Логин:</strong> ohrannik<br>
                    <strong>Пароль:</strong> 12345
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
