{% extends 'core/base.html' %}
{% block content %}

<div class="row justify-content-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow border-0" style="border-radius: 20px;">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Отследить статус пропуска</h3>
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Номер документа</label>
                        <input type="text" name="document_number" class="form-control text-center fs-5" placeholder="4500 123456" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3">
                        Проверить статус
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'index' %}" class="text-muted">Вернуться на главную</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
